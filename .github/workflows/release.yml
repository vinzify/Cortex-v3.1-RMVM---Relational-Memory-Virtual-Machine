name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate Release Candidate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.13.1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Check Dependency Manifest Hash
        run: pwsh -NoProfile -NonInteractive -File ./scripts/check_dependency_manifest_hash.ps1

      - name: Check Proto Checksums
        run: pwsh -NoProfile -NonInteractive -File ./scripts/check_proto_checksums.ps1

      - name: Run Rust Tests
        run: cargo test --workspace --locked

      - name: Run Conformance Suite
        run: cargo run --locked -p rmvm-tests --bin conformance_runner -- check

      - name: Build TypeScript SDK
        working-directory: sdk/typescript
        run: |
          npm ci --include=dev
          npm run build
          npm pack --dry-run

      - name: Build Python SDK
        working-directory: sdk/python
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

  build-server-binaries:
    name: Build rmvm-grpc-server (${{ matrix.os }}-${{ runner.arch }})
    needs: [validate]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
          - runner: macos-latest
            os: macos
          - runner: windows-latest
            os: windows
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1

      - name: Build Release Binary
        run: cargo build --locked -p rmvm-grpc --bin rmvm-grpc-server --release

      - name: Package Binary + Checksum
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $binPath = if ("${{ matrix.os }}" -eq "windows") {
            "target/release/rmvm-grpc-server.exe"
          } else {
            "target/release/rmvm-grpc-server"
          }
          $arch = "$env:RUNNER_ARCH".ToLowerInvariant()
          $ext = if ("${{ matrix.os }}" -eq "windows") { ".exe" } else { "" }
          $asset = "rmvm-grpc-server-${{ matrix.os }}-$arch$ext"
          Copy-Item $binPath "release/$asset"
          $hash = (Get-FileHash "release/$asset" -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -Path "release/$asset.sha256" -Value "$hash  $asset" -Encoding utf8NoBOM

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rmvm-grpc-server-${{ matrix.os }}-${{ runner.arch }}
          path: release/*
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release Assets
    needs: [build-server-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Attach Assets To Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true

  publish-crates:
    name: Publish Rust Crates
    needs: [validate]
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1

      - name: Publish rmvm-proto
        run: cargo publish -p rmvm-proto --locked

      - name: Publish rmvm-kernel (retry index propagation)
        shell: bash
        run: |
          for i in $(seq 1 12); do
            if cargo publish -p rmvm-kernel --locked --no-verify; then
              exit 0
            fi
            echo "rmvm-kernel publish retry $i/12 after crates.io index propagation delay"
            sleep 20
          done
          echo "failed to publish rmvm-kernel after retries"
          exit 1

  publish-npm:
    name: Publish npm SDK
    needs: [validate]
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.13.1
          registry-url: https://registry.npmjs.org

      - name: Publish @cortex/rmvm-sdk
        working-directory: sdk/typescript
        run: |
          npm ci --include=dev
          npm run build
          npm publish --access public

  publish-pypi:
    name: Publish Python SDK
    needs: [validate]
    runs-on: ubuntu-latest
    env:
      TWINE_USERNAME: __token__
      TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Publish cortex-rmvm-sdk
        working-directory: sdk/python
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine upload dist/*
